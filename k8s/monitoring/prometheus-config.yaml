apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: url-shortener
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    rule_files:
      - "/etc/prometheus/rules/rules.yml"

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]

    scrape_configs:
      - job_name: "url-shortener"
        metrics_path: "/metrics"
        static_configs:
          # Note: We are using url-shortener:80 because your K8s service 
          # is named "url-shortener" and exposes port 80 (routing to 8000 internally).
          - targets: ["url-shortener:80"]
