apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
  namespace: url-shortener
data:
  # This tells Grafana where to look for auto-provisioned dashboards
  dashboard-provider.yaml: |
    apiVersion: 1
    providers:
    - name: 'default'
      orgId: 1
      folder: ''
      type: file
      disableDeletion: false
      updateIntervalSeconds: 10
      options:
        path: /var/lib/grafana/dashboards
        
  # This is the actual JSON dashboard
  url-shortener.json: |
    {
      "title": "URL Shortener Dashboard",
      "refresh": "10s",
      "style": "dark",
      "schemaVersion": 38,
      "panels": [
        {
          "type": "stat",
          "title": "Total URLs Shortened",
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 0 },
          "targets": [ { "expr": "total_urls_created_total", "refId": "A" } ]
        },
        {
          "type": "stat",
          "title": "Total Redirects",
          "gridPos": { "h": 8, "w": 6, "x": 6, "y": 0 },
          "targets": [ { "expr": "total_redirects_total", "refId": "A" } ]
        },
        {
          "type": "gauge",
          "title": "Active URLs Right Now",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [ { "expr": "active_urls", "refId": "A" } ]
        },
        {
          "type": "timeseries",
          "title": "URL Creation Rate (per minute)",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "targets": [ { "expr": "rate(total_urls_created_total[1m])", "refId": "A" } ]
        }
      ]
    }
